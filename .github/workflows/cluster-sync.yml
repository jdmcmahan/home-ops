on:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'infrastructure/sidero/omni/resources/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Sync cluster templates with Sidero Omni
    steps:
      - name: Checkout cluster templates
        uses: actions/checkout@v6

      - name: Run omnictl
        uses: jdmcmahan/omnictl-action@v1.88.0
        with:
          omni-endpoint: ${{ secrets.OMNI_ENDPOINT }}
          omni-service-account-key: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
          command: omnictl cluster template -f ./infrastructure/sidero/omni/resources/cluster/vriska.yaml sync --verbose
