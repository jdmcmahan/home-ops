---
apiVersion: v1
kind: Service
metadata:
  name: new-peepums
  namespace: prod
spec:
  type: ExternalName
  externalName: new-peepums.mcmahan.io
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: new-peepums
spec:
  hostnames: [ "new-peepums.mcmahan.io" ]
  parentRefs:
    - name: local
      namespace: traefik
      sectionName: websecure
  rules:
    - backendRefs:
        - name: new-peepums
          port: 5000
