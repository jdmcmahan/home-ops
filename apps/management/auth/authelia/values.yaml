---
# yaml-language-server: $schema=https://raw.githubusercontent.com/authelia/chartrepo/master/charts/authelia/values.schema.json
ingress:
  enabled: true

  gatewayAPI:
    enabled: true
    parentRefs:
      - name: remote
        namespace: traefik
        sectionName: websecure

secret:
  additionalSecrets:
    authelia-cluster-app:
      items:
        - key: password
          path: postgres-password

configMap:
  theme: dark

  authentication_backend:
    file:
      enabled: true

  notifier:
    filesystem:
      enabled: true
      filename: /config/notification.txt

  session:
    cookies:
      - domain: mcmahan.io
        subdomain: auth

  storage:
    postgres:
      enabled: true
      address: tcp://authelia-cluster-rw.authelia.svc.cluster.local:5432
      database: app
      username: app
      password:
        secret_name: authelia-cluster-app
        path: postgres-password
