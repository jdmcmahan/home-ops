---
server:
  route:
    main:
      enabled: true
      hostnames:
        - authentik.mcmahan.io
      parentRefs:
        - name: local
          namespace: traefik
          sectionName: websecure

worker:
  env:
    - name: AUTHENTIK_POSTGRESQL__HOST
      valueFrom:
        secretKeyRef:
          name: authentik-cluster-app
          key: host
    - name: AUTHENTIK_POSTGRESQL__NAME
      valueFrom:
        secretKeyRef:
          name: authentik-cluster-app
          key: dbname
    - name: AUTHENTIK_POSTGRESQL__USER
      valueFrom:
        secretKeyRef:
          name: authentik-cluster-app
          key: username
    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-cluster-app
          key: password

  metrics:
    enabled: true
  serviceMonitor:
    enabled: true

prometheus:
  rules:
    enabled: true
