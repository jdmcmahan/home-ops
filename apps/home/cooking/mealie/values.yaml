---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/library/common/values.schema.json
controllers:
  mealie:
    containers:
      app:
        image:
          repository: ghcr.io/mealie-recipes/mealie
          tag: v3.21.0
          pullPolicy: IfNotPresent
        env:
          TZ: "America/Chicago"
          BASE_URL: "https://mealie.mcmahan.io"
          OIDC_AUTH_ENABLED: "true"
          OIDC_PROVIDER_NAME: "authentik"
          OIDC_CONFIGURATION_URL: "https://auth.mcmahan.io/application/o/mealie/.well-known/openid-configuration"
          OIDC_SIGNUP_ENABLED: "false"
          OIDC_AUTO_REDIRECT: "true"
          OIDC_REMEMBER_ME: "true"
        envFrom:
          - secretRef:
              name: mealie-oidc

service:
  web:
    enabled: true
    controller: mealie
    type: LoadBalancer
    ports:
      http:
        port: 80
        targetPort: 9000

route:
  mealie:
    hostnames: ["mealie.mcmahan.io"]
    parentRefs:
      - name: remote
        namespace: traefik
        sectionName: websecure
    rules:
      - backendRefs:
          - identifier: web
            port: 80

persistence:
  data:
    enabled: true
    existingClaim: mealie-data
    advancedMounts:
      mealie:
        app:
          - path: /app/data
