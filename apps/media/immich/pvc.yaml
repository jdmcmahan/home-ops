---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-library
spec:
  capacity:
    storage: 50Gi
  accessModes: [ ReadWriteMany ]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs
  nfs:
    server: new-peepums
    path: /volume1/photos
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-library
spec:
  accessModes: [ ReadWriteMany ]
  storageClassName: nfs
  resources:
    requests:
      storage: 50Gi
