---
extraEnv:
  TZ: "America/Chicago"

config:
  persistence:
    existingClaim: overseerr-config

route:
  main:
    enabled: true
    hostnames: ["seerr.mcmahan.io"]
    parentRefs:
      - name: remote
        namespace: traefik
        sectionName: websecure
  overseerr:
    enabled: true
    hostnames: ["overseerr.mcmahan.io"]
    parentRefs:
      - name: remote
        namespace: traefik
        sectionName: websecure
    filters:
      - type: RequestRedirect
        requestRedirect:
          hostname: seerr.mcmahan.io
          statusCode: 301
